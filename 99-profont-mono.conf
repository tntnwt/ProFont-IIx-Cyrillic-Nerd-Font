<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <match target="scan">
    <test name="family" compare="eq">
      <string>ProFont Cyrillic IIx Nerd Font Mono</string>
    </test>
    <edit name="spacing" mode="assign">
      <int>100</int>
    </edit>
  </match>
</fontconfig>
